<!-- Good UI Design : minimze page reloads and #-pages to navigate -->
<!DOCTYPE html>
<html>
  <head>
    <title>Home</title>
  </head>
  <body>
    <div style="text-align:center; margin-top: 10%; border:1px solid #ccc; padding:20px;">
      <b>Welcome to the Home Page!</b>
      <br><br>
      <form action="/hello" method="get" style="margin-bottom: 10px;">
        <button type="submit">Print Hello World!</button>
      </form>
      <form action="/health" method="get" style="margin-bottom: 10px;">
        <button type="submit">Health Check</button>
      </form>
      <!-- # Element beneath it ( visually seperated layout desireable ) -->
      <form action="/getUserBase" method="get" style="margin-bottom: 10px;">
        <button type="submit">Get User Base</button>
      </form>
      <form action="/getMySongListByUserId" method="get" style="margin-bottom: 10px;">
        <!-- Greyed-out prompt desireable ( user-navig ) -->
         <!-- Mandatory fields desired -->
        <input type="text" name="user_id" placeholder="Enter user_id" required>
        <button type="submit">Get My Song List By User ID</button>
      </form>
    </div>
    <!-- POST Methods -->
    <div style="text-align:center; margin-top: 10%; border:1px solid #ccc; padding:20px;">
        <h3>POST API Calls</h3>
        <form action="/addUser" method="post" style="margin-bottom: 10px;">
            <input type="text" name="user" placeholder="Enter new user" required>
            <button type="submit">Add User</button>
        </form>
        <form action="/updateMySongList" method="post" style="margin-bottom: 10px;">
            <input type="text" name="song" placeholder="Enter new song" required>
            <button type="submit">Add Song to Song List</button>
        </form>
        <form action="/updateSongListByUserId" method="post" style="margin-bottom: 10px;">
            <input type="text" name="user_id" placeholder="Enter user_id" required>
            <input type="text" name="song" placeholder="Enter song" required>
            <button type="submit">Add Song to User's Song List</button>
        </form>
    </div>
  </body>
</html>
