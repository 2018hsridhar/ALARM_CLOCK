<!-- Display dynamic data -->
<!-- Leverages Jinja2 Templates -->
<!DOCTYPE html>
<html>
  <head>
    <title>Display My Data!</title>
  </head>
  <body>
    <div style="text-align: center; margin-top: 20%;">
      <b>Hello World</b>
      <br><br>
      {% if payload %}
      <!-- Output value into rendered HTML -->
        <pre>{{ payload | tojson(indent=2) }}</pre>
      {% endif %}
    </div>
  </body>
</html>
